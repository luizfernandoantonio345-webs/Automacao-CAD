# ====================================================================
# docker-compose.yml - Fase 1: Stack Completo Local
# Services: Workers Celery + RabbitMQ + Redis + Flower + Prometheus
# Run: docker-compose up -d
# ====================================================================

version: "3.9"

services:
  # ✓ RabbitMQ: Message Broker distribuído (porta 5672)
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: cad-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-cad_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?Set RABBITMQ_PASS in .env}
      RABBITMQ_DEFAULT_VHOST: /cad_vhost
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI (user: guest, pass: guest)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cad-network

  # ✓ Redis: Cache + Session store (porta 6379)
  redis:
    image: redis:7-alpine
    container_name: cad-redis
    command: redis-server --requirepass ${REDIS_PASS:?Set REDIS_PASS in .env}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cad-network

  # ✓ Celery Worker 1 (concurrency=4)
  worker-1:
    build: .
    container_name: cad-worker-1
    environment:
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-cad_user}:${RABBITMQ_PASS}@rabbitmq:5672/cad_vhost
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASS}@redis:6379/0
      REDIS_URL: redis://:${REDIS_PASS}@redis:6379/1
      JOBS_REDIS_URL: redis://:${REDIS_PASS}@redis:6379/1
      PYTHONUNBUFFERED: "1"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - cad-network
    restart: unless-stopped

  # ✓ Celery Worker 2 (concurrency=4)
  worker-2:
    build: .
    container_name: cad-worker-2
    environment:
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-cad_user}:${RABBITMQ_PASS}@rabbitmq:5672/cad_vhost
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASS}@redis:6379/0
      REDIS_URL: redis://:${REDIS_PASS}@redis:6379/1
      JOBS_REDIS_URL: redis://:${REDIS_PASS}@redis:6379/1
      PYTHONUNBUFFERED: "1"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - cad-network
    restart: unless-stopped

  # ✓ Flower: Dashboard web Celery (porta 5555)
  flower:
    image: mher/flower:2.0.1
    container_name: cad-flower
    environment:
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-cad_user}:${RABBITMQ_PASS}@rabbitmq:5672/cad_vhost
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASS}@redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - rabbitmq
      - redis
    networks:
      - cad-network
    restart: unless-stopped
    # Acesso: http://localhost:5555

  # ✓ Prometheus: Coleta de métricas (porta 9090)
  prometheus:
    image: prom/prometheus:latest
    container_name: cad-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - cad-network
    restart: unless-stopped
    # Acesso: http://localhost:9090

  # ✓ Grafana: Dashboards (porta 3000)
  grafana:
    image: grafana/grafana:latest
    container_name: cad-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASS:-changeme}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana_dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana_datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
    networks:
      - cad-network
    restart: unless-stopped
    # Acesso: http://localhost:3000 (user: admin, pass: definida em GRAFANA_ADMIN_PASS)

volumes:
  rabbitmq_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  cad-network:
    driver: bridge
