# infra/railway.toml — EngCAD Railway.app deployment
# Docs: https://docs.railway.app/reference/railway-toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**/*.py", "requirements*.txt"]

[deploy]
startCommand = "uvicorn server:app --host 0.0.0.0 --port $PORT --workers 4 --loop uvloop"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[deploy.environmentVariables]
PYTHONUNBUFFERED = "1"
APP_ENV = "production"
