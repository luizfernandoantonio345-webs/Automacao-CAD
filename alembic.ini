# Engenharia CAD — Alembic Configuration

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
timezone = UTC

# sys.path path, will be prepended to sys.path if present
prepend_sys_path = .

# version file format
output_encoding = utf-8

# Database URL — pode ser sobrescrita via variável de ambiente
# Exemplos:
#   sqlite:///data/engcad.db  (desenvolvimento local)
#   postgresql://user:pass@host/db?sslmode=require  (produção)
#
# IMPORTANTE: Para maior segurança, use a variável de ambiente DATABASE_URL
# em vez de colocar credenciais neste arquivo.
sqlalchemy.url = sqlite:///data/engcad.db


[post_write_hooks]
# Formatar migrations com Black (se disponível)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 99


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
