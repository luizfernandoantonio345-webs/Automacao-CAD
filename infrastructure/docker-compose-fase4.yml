# ====================================================================
# FASE 4: GPU Support (CUDA)
# Aceleração para tasks AI com CUDA
# ====================================================================

# ✓ Extensões para docker-compose.yml
version: '3.9'

services:
  # ... serviços existentes ...

  # ✓ Worker com GPU (se disponível)
  worker-gpu:
    build: .
    container_name: cad-worker-gpu
    environment:
      CELERY_BROKER_URL: amqp://cad_user:cad_password_123@rabbitmq:5672/cad_vhost
      CELERY_RESULT_BACKEND: redis://:redis_password_123@redis:6379/0
      REDIS_URL: redis://:redis_password_123@redis:6379/1
      JOBS_REDIS_URL: redis://:redis_password_123@redis:6379/1
      CUDA_VISIBLE_DEVICES: 0  # GPU 0
      PYTHONUNBUFFERED: "1"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - cad-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  # ... volumes existentes ...

networks:
  cad-network: