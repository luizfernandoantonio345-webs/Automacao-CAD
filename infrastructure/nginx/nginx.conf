# infrastructure/nginx/nginx.conf
# Nginx reverse proxy for EngCAD production stack
# Handles: TLS termination, HTTP→HTTPS redirect, WebSocket upgrade, rate limiting

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ─────────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain application/json application/javascript text/css;
    gzip_min_length    1024;
    gzip_vary          on;

    # ── Security ────────────────────────────────────────────────────────────────
    server_tokens         off;
    client_max_body_size  20M;
    client_body_timeout   12s;
    client_header_timeout 12s;
    send_timeout          10s;

    # ── Rate limiting zones ─────────────────────────────────────────────────────
    # General API: 120 req/min per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=2r/s;
    # Auth endpoints: 10 req/min per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    # License/HWID: 5 req/min per IP
    limit_req_zone $binary_remote_addr zone=license_limit:10m rate=5r/m;

    limit_req_status 429;

    # ── Upstream ────────────────────────────────────────────────────────────────
    upstream backend {
        least_conn;
        server backend:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ───────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.engcad.com.br;

        # ── TLS ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/api.engcad.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.engcad.com.br/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS (6 months)
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"                              always;
        add_header X-Frame-Options           "DENY"                                 always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

        # ── Auth endpoints — strict rate limit ──────────────────────────────
        location ~ ^/api/auth/(login|register) {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/snippets/proxy_params.conf;
        }

        # ── License / HWID — strict rate limit ─────────────────────────────
        location /api/license/ {
            limit_req zone=license_limit burst=3 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/snippets/proxy_params.conf;
        }

        # ── WebSocket (SSE & WS) ────────────────────────────────────────────
        location ~ ^/(ws|api/sse|api/events) {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_read_timeout          86400s;
            proxy_send_timeout          86400s;
        }

        # ── General API ─────────────────────────────────────────────────────
        location / {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/snippets/proxy_params.conf;
        }
    }
}
