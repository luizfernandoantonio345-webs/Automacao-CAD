# ====================================================================
# prometheus.yml - Configuração Prometheus
# Scrapa métricas dos workers Celery + Flower
# ====================================================================

global:
  scrape_interval: 15s # Default 15s
  evaluation_interval: 15s # Avalia rules a cada 15s
  external_labels:
    monitor: "cad-automacao"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - 'localhost:9093'

rule_files:
  # - "first_rules.yml"

scrape_configs:
  # ✓ Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ✓ Celery Flower endpoint (métricas Celery)
  - job_name: "flower"
    static_configs:
      - targets: ["flower:5555"]
    metrics_path: "/metrics"
    scrape_interval: 30s

  # ✓ Workers Celery (direct exporter se implementado)
  # Nota: Requer prometheus_exporter em cada worker
  # - job_name: 'celery-worker'
  #   static_configs:
  #     - targets: ['worker-1:8000', 'worker-2:8000']
  #   metrics_path: '/metrics'
