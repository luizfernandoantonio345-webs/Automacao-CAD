# ═══════════════════════════════════════════════════════════════════════════════
# ENGENHARIA CAD — Kubernetes Deployment
# ═══════════════════════════════════════════════════════════════════════════════
# Namespace dedicado para isolamento
apiVersion: v1
kind: Namespace
metadata:
  name: engenharia-cad
  labels:
    app: engenharia-cad
    environment: production
---
# ═══════════════════════════════════════════════════════════════════════════════
# CONFIG MAP — Configurações não-sensíveis
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: engenharia-cad-config
  namespace: engenharia-cad
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "120"
  RATE_LIMIT_REGISTER_PER_MINUTE: "3"
  MAX_EXCEL_UPLOAD_MB: "15"
  CORS_ALLOWED_ORIGINS: "https://app.engenharia-cad.com,https://engenharia-cad.vercel.app"
  # LLM Gateway
  LLM_DEFAULT_MODEL: "gpt-4o"
  LLM_MAX_TOKENS: "4096"
  LLM_TEMPERATURE: "0.7"
  # CAM Config
  CAM_DEFAULT_MACHINE: "hypertherm_powermax105"
  CAM_NESTING_ALGORITHM: "genetic"
---
# ═══════════════════════════════════════════════════════════════════════════════
# SECRET — Variáveis sensíveis (substituir valores em produção!)
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: engenharia-cad-secrets
  namespace: engenharia-cad
type: Opaque
stringData:
  JARVIS_SECRET: "CHANGE_ME_TO_64_CHAR_RANDOM_STRING_PRODUCTION"
  DATABASE_URL: "postgresql://user:pass@postgres:5432/engcad"
  REDIS_URL: "redis://redis:6379/0"
  # Stripe
  STRIPE_SECRET_KEY: "sk_live_CHANGE_ME"
  STRIPE_WEBHOOK_SECRET: "whsec_CHANGE_ME"
  STRIPE_PUBLISHABLE_KEY: "pk_live_CHANGE_ME"
  STRIPE_PRICE_STARTER: "price_starter_live"
  STRIPE_PRICE_PRO: "price_pro_live"
  STRIPE_PRICE_ENTERPRISE: "price_enterprise_live"
  # LLM API Keys
  OPENAI_API_KEY: "sk-CHANGE_ME"
  ANTHROPIC_API_KEY: "sk-ant-CHANGE_ME"
---
# ═══════════════════════════════════════════════════════════════════════════════
# PERSISTENT VOLUME CLAIM — Dados persistentes
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: engenharia-cad-data
  namespace: engenharia-cad
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
---
# ═══════════════════════════════════════════════════════════════════════════════
# DEPLOYMENT — API Server
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: engenharia-cad-api
  namespace: engenharia-cad
  labels:
    app: engenharia-cad
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: engenharia-cad
      component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: engenharia-cad
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: engenharia-cad
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: engenharia-cad/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: engenharia-cad-config
            - secretRef:
                name: engenharia-cad-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: engenharia-cad-data
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: engenharia-cad
                    component: api
                topologyKey: kubernetes.io/hostname
---
# ═══════════════════════════════════════════════════════════════════════════════
# DEPLOYMENT — Celery Worker
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: engenharia-cad-worker
  namespace: engenharia-cad
  labels:
    app: engenharia-cad
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: engenharia-cad
      component: worker
  template:
    metadata:
      labels:
        app: engenharia-cad
        component: worker
    spec:
      serviceAccountName: engenharia-cad
      containers:
        - name: worker
          image: engenharia-cad/api:latest
          command: ["celery", "-A", "celery_app", "worker", "-l", "INFO", "-c", "4"]
          envFrom:
            - configMapRef:
                name: engenharia-cad-config
            - secretRef:
                name: engenharia-cad-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: engenharia-cad-data
---
# ═══════════════════════════════════════════════════════════════════════════════
# SERVICE — API LoadBalancer
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: engenharia-cad-api
  namespace: engenharia-cad
  labels:
    app: engenharia-cad
    component: api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: engenharia-cad
    component: api
---
# ═══════════════════════════════════════════════════════════════════════════════
# INGRESS — Entrada HTTPS com TLS
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: engenharia-cad-ingress
  namespace: engenharia-cad
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - api.engenharia-cad.com
      secretName: engenharia-cad-tls
  rules:
    - host: api.engenharia-cad.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: engenharia-cad-api
                port:
                  number: 80
---
# ═══════════════════════════════════════════════════════════════════════════════
# HORIZONTAL POD AUTOSCALER
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: engenharia-cad-api-hpa
  namespace: engenharia-cad
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: engenharia-cad-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
---
# ═══════════════════════════════════════════════════════════════════════════════
# SERVICE ACCOUNT
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ServiceAccount
metadata:
  name: engenharia-cad
  namespace: engenharia-cad
---
# ═══════════════════════════════════════════════════════════════════════════════
# POD DISRUPTION BUDGET — Alta disponibilidade
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: engenharia-cad-api-pdb
  namespace: engenharia-cad
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: engenharia-cad
      component: api
---
# ═══════════════════════════════════════════════════════════════════════════════
# NETWORK POLICY — Segurança de rede
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: engenharia-cad-policy
  namespace: engenharia-cad
spec:
  podSelector:
    matchLabels:
      app: engenharia-cad
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - podSelector:
            matchLabels:
              app: engenharia-cad
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432  # PostgreSQL
        - protocol: TCP
          port: 6379  # Redis
        - protocol: TCP
          port: 443   # HTTPS (Stripe, LLM APIs)
        - protocol: TCP
          port: 5672  # RabbitMQ
