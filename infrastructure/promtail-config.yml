server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ✓ Logs dos containers Docker
  - job_name: cad_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "job"
      - source_labels: ["__meta_docker_container_name"]
        regex: "/cad-(.*)"
        target_label: "service"

  # ✓ Logs dos workers (arquivos locais)
  - job_name: cad_workers
    static_configs:
      - targets:
          - localhost
        labels:
          job: cad_workers
          __path__: /var/log/cad/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            timestamp: timestamp
            message: message
            task_id: task_id
            job_type: job_type
      - labels:
          level:
          job_type:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
