[pytest]
# ═══════════════════════════════════════════════════════════════════════════════
# CONFIGURAÇÃO DO PYTEST - AUTOMAÇÃO CAD
# ═══════════════════════════════════════════════════════════════════════════════

# Diretórios de teste
testpaths = tests

# Padrões de descoberta de testes
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output verboso por padrão
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra
    --color=yes

# Markers customizados
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    e2e: marks tests as end-to-end tests  
    autocad: marks tests requiring AutoCAD installed
    gpu: marks tests requiring GPU

# Ignore warnings de bibliotecas externas
filterwarnings =
    ignore::DeprecationWarning:ezdxf.*
    ignore::PendingDeprecationWarning
    ignore::UserWarning:pydantic.*

# Logging durante testes
log_cli = false
log_cli_level = WARNING

# Paralelismo (usar com pytest-xdist)
# -n auto para auto-detectar CPUs

# Coverage mínima (usar com: pytest --cov=./ --cov-fail-under=60)
