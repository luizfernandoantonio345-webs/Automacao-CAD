# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD PIPELINE - ENGCAD AUTOMAÇÃO
# ═══════════════════════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  MOCK_AUTOCAD: "1"
  ENG_AUTH_SECRET: test-secret

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # TESTES BACKEND (pytest)
  # ─────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: 🧪 Run Pytest
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing
        env:
          MOCK_AUTOCAD: "1"
          PYTHONDONTWRITEBYTECODE: "1"

      - name: 📊 Upload Coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────────
  # QUALITY CHECKS (Windows - original)
  # ─────────────────────────────────────────────────────────────────────────────
  quality:
    name: 🔍 Quality Checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if (Test-Path integration/python_api/requirements.txt) {
            pip install -r integration/python_api/requirements.txt
          }
        continue-on-error: true

      - name: Install frontend dependencies
        shell: pwsh
        run: |
          if (Test-Path frontend/package-lock.json) {
            Push-Location frontend
            npm ci
            Pop-Location
          }
        continue-on-error: true

      - name: Run quality checks
        shell: pwsh
        run: |
          if (Test-Path ./run_quality_checks.ps1) {
            ./run_quality_checks.ps1
          } else {
            Write-Host "Quality checks script not found, skipping"
          }
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # LINT BACKEND
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Python Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Linters
        run: pip install ruff

      - name: 🔍 Run Ruff
        run: ruff check . --ignore=E501,F401,F841,E402 --exclude=alembic/versions/
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # SECURITY SCAN
  # ─────────────────────────────────────────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 🔒 Check Dependencies
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true
        continue-on-error: true
